<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Pink Pixels | Months</title>

    <!-- Fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Noto+Serif+Display:wght@400;600;700&family=Tangerine:wght@700&display=swap" rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/subject.css">

</head>

<body>

<header class="navbar">

    <a href="index.html" class="logo">
        Pink Pixels
    </a>

    <div class="subject-heading">

        <h1 id="subjectTitle">
            Subject
        </h1>

    </div>

</header>

<main class="months-page">

    <h2 class="page-title">
        Choose a Month
    </h2>

    <div class="months-grid">

        <div class="month-card" data-month="June">
            <div class="star">
                <span>June</span>
            </div>
        </div>

        <div class="month-card" data-month="July">
            <div class="star">
                <span>July</span>
            </div>
        </div>

        <div class="month-card" data-month="August">
            <div class="star">
                <span>August</span>
            </div>
        </div>

        <div class="month-card" data-month="September">
            <div class="star">
                <span>September</span>
            </div>
        </div>

        <div class="month-card" data-month="October">
            <div class="star">
                <span>October</span>
            </div>
        </div>

        <div class="month-card" data-month="November">
            <div class="star">
                <span>November</span>
            </div>
        </div>

        <div class="month-card" data-month="December">
            <div class="star">
                <span>December</span>
            </div>
        </div>

        <div class="month-card" data-month="January">
            <div class="star">
                <span>January</span>
            </div>
        </div>

        <div class="month-card" data-month="February">
            <div class="star">
                <span>February</span>
            </div>
        </div>

        <div class="month-card" data-month="March">
            <div class="star">
                <span>March</span>
            </div>
        </div>

        <div class="month-card" data-month="April">
            <div class="star">
                <span>April</span>
            </div>
        </div>

        <div class="month-card" data-month="May">
            <div class="star">
                <span>May</span>
            </div>
        </div>

    </div>

    <button class="back-btn" onclick="history.back()">
        ← Back
    </button>

</main>

<script src="subjects.js"></script>

</body>

</html>
